<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugar Crush - Your Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header class="header">
        <div class="menu-icon">&#9776;</div>
        <div class="dropdown-menu">
            <a href="../index.html">Home</a>
            <a href="../Order/index.html">Order</a>
            <a href="../Locations/index.html">Locations</a>
            <a href="../Our Story/index.html">Our Story</a>
        </div>
    </header>

    <div class="banner">
        <h1>Sugar Crush</h1>
    </div>

    <div class="flex-container">
        <div class="cart">
            <h2>Your Cart</h2>
            <div id="cart-items">
            </div>
        </div>
        <div class="info">
            <h2>Information</h2>
            <form id="order-form" action="submit_order.php" method="post">
                <input type="text" name="name" placeholder="Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="text" name="phone" placeholder="Phone" required>

                <div class="order-option">
                    <label><input type="radio" name="order_option" value="pickup" required> Pickup</label>
                    <label><input type="radio" name="order_option" value="delivery" required> Delivery</label>
                </div>

                <div class="branch-address" style="display: none;">
                    <label for="branch">Select a Branch:</label>
                    <select id="branch" name="branch">
                        <option value="59C Nguyen Dinh Chieu, Vo Thi Sau Ward, District 3, Ho Chi Minh City">
                            59C Nguyen Dinh Chieu, Vo Thi Sau Ward, District 3, Ho Chi Minh City
                        </option>
                        <option value="279 Nguyen Tri Phuong, Ward 5, District 10, Ho Chi Minh City">
                            279 Nguyen Tri Phuong, Ward 5, District 10, Ho Chi Minh City
                        </option>
                        <option value="91 3/2 Street, Ward 11, District 10, Ho Chi Minh City">
                            91 3/2 Street, Ward 11, District 10, Ho Chi Minh City
                        </option>
                        <option value="196 Tran Quang Khai, Tan Dinh Ward, District 1, Ho Chi Minh City">
                            196 Tran Quang Khai, Tan Dinh Ward, District 1, Ho Chi Minh City
                        </option>
                        <option value="54 Nguyen Van Thu, Da Kao Ward, District 1, Ho Chi Minh City">
                            54 Nguyen Van Thu, Da Kao Ward, District 1, Ho Chi Minh City
                        </option>
                        <option value="1A Hoang Dieu, Ward 10, Phu Nhuan District, Ho Chi Minh City">
                            1A Hoang Dieu, Ward 10, Phu Nhuan District, Ho Chi Minh City
                        </option>
                        <option value="17 Pham Ngoc Thach, Ward 6, District 3, Ho Chi Minh City">
                            17 Pham Ngoc Thach, Ward 6, District 3, Ho Chi Minh City
                        </option>
                        <option value="Functional Area No. 15, New Urban South City, Phong Phu Commune, Binh Chanh District, Ho Chi Minh City">
                            Functional Area No. 15, New Urban South City, Phong Phu Commune, Binh Chanh District, Ho Chi Minh City
                        </option>
                    </select>
                </div>

                <div class="address">
                    <input type="text" name="address" placeholder="Address">
                    <input type="text" name="district" placeholder="District">
                    <input type="text" name="ward" placeholder="Ward">
                </div>

                <div class="datetime">
                    <label for="datetime">Select Date and Time:</label>
                    <input type="datetime-local" id="datetime" name="datetime" required>
                </div>

                <div class="totals">
                    <label>Price: <input type="text" id="price" name="price" readonly></label>
                    <label>Shipping Fee: <input type="text" id="shipping" name="shipping" readonly></label>
                    <label>Total: <input type="text" id="total" name="total" readonly></label>
                </div>

                <button type="submit">Order</button>
            </form>
        </div>
    </div>
</div>
<script src="order.js"></script>
</body>
</html>
